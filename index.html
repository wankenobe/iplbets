<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#004BA0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="IPL Bets"/>
<title>IPL Bets</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#004BA0;--gold:#F7A01C;--orange:#E8440A;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#e8e8e6;
  --text:#1a1a1a;--text2:#666660;--text3:#99998f;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.22);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111110;--bg2:#1c1c1b;--bg3:#252524;--text:#f0f0ee;--text2:#999993;--text3:#666660;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);}
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent;}

#app{height:100%;display:flex;flex-direction:column;padding-top:var(--safe-top);}

/* HEADER */
.header{padding:14px 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo-group{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--blue);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-left:6px;transition:background 0.4s;}
.sync-dot.online{background:#4caf50;}
.season-badge{background:var(--gold);color:#7a4800;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;}

/* SCOREBOARD */
.scoreboard{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.player-card{background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border);padding:9px 8px;text-align:center;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;margin:0 auto 5px;}
.p0 .avatar{background:#dceeff;color:#003a80;}
.p1 .avatar{background:#d4f5e8;color:#065038;}
.p2 .avatar{background:#fdf0d9;color:#7a4800;}
.pname{font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbal{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--blue);line-height:1.2;}
.pbal.low{color:var(--orange);}

/* TABS */
.tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg);}
.tab-btn{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text2);font-weight:500;}
.tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* WHO AM I */
.whoami-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.whoami-label{font-size:11px;color:var(--text2);font-weight:500;white-space:nowrap;}
.whoami-btns{display:flex;gap:5px;flex:1;overflow-x:auto;}
.wi-btn{padding:5px 12px;border-radius:14px;border:0.5px solid var(--border);background:transparent;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);white-space:nowrap;flex-shrink:0;}
.wi-btn.ap0{background:#dceeff;color:#003a80;border-color:#8bbfe8;}
.wi-btn.ap1{background:#d4f5e8;color:#065038;border-color:#7ecfaf;}
.wi-btn.ap2{background:#fdf0d9;color:#7a4800;border-color:#e8c97a;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 0 calc(16px + var(--safe-bottom));}

/* MATCH CARDS */
.match-card{margin:0 12px 10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.match-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.match-no{font-size:11px;color:var(--text2);font-weight:500;}
.match-date{font-size:11px;color:var(--text3);}
.ms{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.4px;}
.ms-upcoming{background:#dceeff;color:#003a80;}
.ms-live{background:#fde8e8;color:#a32d2d;}
.ms-done{background:#d4f5e8;color:#065038;}
.teams-row{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px;}
.team{text-align:center;flex:1;}
.team-logo{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;overflow:hidden;}.team-logo svg{width:44px;height:44px;display:block;}
.team-abbr{font-size:11px;font-weight:700;color:var(--text2);}
.team-name{font-size:11px;color:var(--text3);margin-top:1px;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text3);padding:0 8px;}
.pick-row{display:flex;gap:6px;padding:0 12px 12px;}
.pick-btn{flex:1;padding:10px 4px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:2px;}
.pick-btn:active{border-color:var(--blue);background:#dceeff;}
.pick-flag{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;font-weight:500;}
.pick-team{font-size:14px;font-weight:700;color:var(--blue);}
.pick-draw .pick-team{color:var(--text2);font-size:12px;}
.bets-on-match{border-top:0.5px solid var(--border);padding:7px 12px;display:flex;flex-wrap:wrap;gap:4px;}
.bet-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;}
.bc0{background:#dceeff;color:#003a80;}
.bc1{background:#d4f5e8;color:#065038;}
.bc2{background:#fdf0d9;color:#7a4800;}
.declare-row{padding:0 12px 10px;}
.declare-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);}
.winner-label{padding:6px 12px 10px;font-size:12px;color:var(--text2);}
.winner-label strong{color:var(--text);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:480px;transform:translateY(40px);transition:transform 0.25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal h3{font-size:17px;font-weight:600;margin-bottom:3px;color:var(--text);}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.modal label,.modal-label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.finput{width:100%;padding:11px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:14px;background:var(--bg2);color:var(--text);-webkit-appearance:none;}
.quick-amounts{display:flex;gap:6px;margin-bottom:14px;}
.qa-btn{flex:1;padding:8px 4px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);}
.qa-btn:active{background:var(--gold);color:#4a2c00;}
.place-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;}
.place-btn:active{background:#003a80;}
.place-btn:disabled{background:var(--bg3);color:var(--text3);}
.cancel-btn{width:100%;padding:10px;background:transparent;border:none;font-size:13px;color:var(--text2);font-family:'DM Sans',sans-serif;cursor:pointer;}
.wopt-btn{flex:1;padding:11px 6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);}
.wopt-btn.selected{background:#dceeff;border-color:var(--blue);color:var(--blue);}
.payout-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.payout-row:last-child{border-bottom:none;}
.payout-win{color:#065038;font-weight:600;}
.payout-lose{color:#a32d2d;font-weight:600;}

/* HISTORY / LB */
.hist-item{margin:0 12px 10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.hist-match{font-size:12px;color:var(--text2);margin-bottom:6px;}
.hist-result{font-size:13px;margin-bottom:2px;}
.hist-win{color:#065038;}
.hist-lose{color:#a32d2d;}
.lb-row{margin:0 12px 8px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text2);width:28px;}
.lb-rank.gold{color:#BA7517;}
.lb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;}
.lb-name{flex:1;font-weight:500;font-size:14px;}
.lb-amount{font-family:'Bebas Neue',sans-serif;font-size:22px;}
.lb-profit{font-size:11px;text-align:right;}
.profit-pos{color:#065038;}
.profit-neg{color:#a32d2d;}

/* CONFIG */
.config-wrap{flex:1;overflow-y:auto;padding:24px 20px calc(24px + var(--safe-bottom));}
.config-wrap textarea{width:100%;padding:11px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-family:monospace;font-size:11.5px;margin-bottom:14px;background:var(--bg2);color:var(--text);height:160px;resize:none;}
.step-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:600;margin-right:6px;flex-shrink:0;}
.step-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;}
.step-body{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px;padding-left:26px;}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;line-height:1.6;}
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
@media(prefers-color-scheme:dark){.toast{background:#f0f0ee;color:#1a1a1a;}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px;">Loading…</div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ══════════════════════════════════════════════
// TEAMS & MATCHES
// ══════════════════════════════════════════════
const TEAMS={
  CSK:{name:'Chennai Super Kings',bg:'#1a1a2e',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#FFC72C"/>
      <!-- lion head silhouette -->
      <ellipse cx="20" cy="21" rx="9" ry="8" fill="#1a1a2e"/>
      <!-- mane -->
      <ellipse cx="20" cy="20" rx="12" ry="11" fill="#E5A000" opacity="0.85"/>
      <ellipse cx="20" cy="21" rx="8" ry="7.5" fill="#1a1a2e"/>
      <!-- face -->
      <ellipse cx="20" cy="22" rx="5.5" ry="5" fill="#D4911A"/>
      <!-- eyes -->
      <circle cx="18" cy="21" r="1.1" fill="#FFF"/>
      <circle cx="22" cy="21" r="1.1" fill="#FFF"/>
      <circle cx="18.3" cy="21.2" r="0.6" fill="#111"/>
      <circle cx="22.3" cy="21.2" r="0.6" fill="#111"/>
      <!-- nose -->
      <ellipse cx="20" cy="23.2" rx="1.2" ry="0.7" fill="#8B5500"/>
      <!-- crown -->
      <polygon points="14,16 16,12 18,15 20,11 22,15 24,12 26,16" fill="#FFC72C" stroke="#E5A000" stroke-width="0.5"/>
    </svg>`},
  MI:{name:'Mumbai Indians',bg:'#003e7e',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#004BA0"/>
      <!-- Sudarshana Chakra (spinning disc) -->
      <circle cx="20" cy="20" r="13" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
      <circle cx="20" cy="20" r="9" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="3" fill="#D4AF37"/>
      <!-- spokes -->
      ${[0,30,60,90,120,150,180,210,240,270,300,330].map(a=>{
        const r=a*Math.PI/180;
        const x1=20+4.5*Math.cos(r), y1=20+4.5*Math.sin(r);
        const x2=20+8.5*Math.cos(r), y2=20+8.5*Math.sin(r);
        return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#D4AF37" stroke-width="1.2"/>`;
      }).join('')}
      <!-- outer triangles (flame tips) -->
      ${[0,45,90,135,180,225,270,315].map(a=>{
        const r=a*Math.PI/180;
        const cx=20+12*Math.cos(r), cy=20+12*Math.sin(r);
        return `<polygon points="${cx.toFixed(1)},${cy.toFixed(1)} ${(cx-1.5*Math.cos(r+1.6)).toFixed(1)},${(cy-1.5*Math.sin(r+1.6)).toFixed(1)} ${(cx-1.5*Math.cos(r-1.6)).toFixed(1)},${(cy-1.5*Math.sin(r-1.6)).toFixed(1)}" fill="#D4AF37"/>`;
      }).join('')}
    </svg>`},
  RCB:{name:'Royal Challengers',bg:'#1a0000',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#CC0000"/>
      <!-- shield -->
      <path d="M20 6 L30 11 L30 22 Q30 30 20 35 Q10 30 10 22 L10 11 Z" fill="#111" stroke="#D4AF37" stroke-width="1"/>
      <!-- lion body (simplified) -->
      <ellipse cx="20" cy="22" rx="6" ry="5" fill="#CC0000"/>
      <!-- lion head -->
      <circle cx="20" cy="17" r="5" fill="#CC0000"/>
      <!-- mane ring -->
      <circle cx="20" cy="17" r="6.5" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      <!-- eyes -->
      <circle cx="18.2" cy="16.5" r="0.8" fill="#fff"/>
      <circle cx="21.8" cy="16.5" r="0.8" fill="#fff"/>
      <!-- crown -->
      <polygon points="15,12 17,9 19,11.5 21,9 23,11.5 25,9 27,12" fill="#D4AF37"/>
      <!-- RCB text hint -->
      <text x="20" y="30" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#D4AF37" font-family="Arial">RCB</text>
    </svg>`},
  KKR:{name:'Kolkata Knight Riders',bg:'#1a0035',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#3A225D"/>
      <!-- shield outline -->
      <path d="M20 7 L31 13 L31 23 Q31 32 20 36 Q9 32 9 23 L9 13 Z" fill="#2A1545" stroke="#D4AF37" stroke-width="1.2"/>
      <!-- Corinthian helmet top -->
      <ellipse cx="20" cy="14" rx="7" ry="6" fill="#D4AF37"/>
      <!-- helmet visor -->
      <rect x="16" y="17" width="8" height="3" rx="1" fill="#3A225D"/>
      <!-- plume/crest -->
      <path d="M20 8 Q18 5 15 6 Q17 8 18 10 Q19 9 20 8Z" fill="#CC0000"/>
      <path d="M20 8 Q22 5 25 6 Q23 8 22 10 Q21 9 20 8Z" fill="#CC0000"/>
      <!-- KKR -->
      <text x="20" y="30" text-anchor="middle" font-size="5" font-weight="bold" fill="#D4AF37" font-family="Arial">KKR</text>
    </svg>`},
  DC:{name:'Delhi Capitals',bg:'#003580',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#17479E"/>
      <!-- shield -->
      <path d="M20 6 L32 12 L32 24 Q32 33 20 37 Q8 33 8 24 L8 12 Z" fill="#003580" stroke="#E8001C" stroke-width="1.5"/>
      <!-- three tigers (simplified as stripes/marks) -->
      <!-- tiger 1 -->
      <ellipse cx="15" cy="17" rx="4" ry="3" fill="#E8001C" opacity="0.9"/>

      <ellipse cx="25" cy="17" rx="4" ry="3" fill="#E8001C" opacity="0.9"/>
      <ellipse cx="25" cy="17" rx="2.5" ry="2" fill="#FF6B00"/>
      <!-- tiger 3 -->
      <ellipse cx="20" cy="24" rx="4" ry="3" fill="#E8001C" opacity="0.9"/>
      <ellipse cx="20" cy="24" rx="2.5" ry="2" fill="#FF6B00"/>
      <!-- DC -->
      <text x="20" y="34" text-anchor="middle" font-size="4" font-weight="bold" fill="#fff" font-family="Arial">DC</text>
    </svg>`},
  PBKS:{name:'Punjab Kings',bg:'#6B0000',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#ED1B24"/>
      <!-- golden shield -->
      <path d="M20 7 L30 12 L30 22 Q30 31 20 35 Q10 31 10 22 L10 12 Z" fill="#8B0000" stroke="#D4AF37" stroke-width="1.5"/>

  RR:{name:'Rajasthan Royals',bg:'#2D0040',
    svg:`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#E83F6F"/>
      <!-- Royal crest oval -->
      <ellipse cx="20" cy="21" rx="12" ry="13" fill="#2D0040" stroke="#D4AF37" stroke-width="1.2"/>
      <!-- Two lions flanking -->
      <!-- Left lion (simplified) -->
      <ellipse cx="13" cy="20" rx="3.5" ry="3" fill="#E83F6F"/>
      <circle cx="13" cy="17.5" r="2.5" fill="#E83F6F"/>
      <!-- Right lion -->
      <ellipse cx="27" cy="20" rx="3.5" ry="3" fill="#E83F6F"/>
      <circle cx="27" cy="17.5" r="2.5" fill="#E83F6F"/>
      <!-- RR monogram -->
      <text x="17" y="24" text-anchor="middle" font-size="7" font-weight="bold" fill="#D4AF37" font-family="Georgia,serif">R</text>
      <text x="23" y="24" text-anchor="middle" font-size="7" font-weight="bold" fill="#D4AF37" font-family="Georgia,serif" transform="scale(-1,1) translate(-46,0)">R</text>
      <!-- Crown top -->
      <polygon points="14,11 16.5,7 18.5,10 20,7 21.5,10 23.5,7 26,11" fill="#D4AF37"/>
      <!-- team name hint -->
      <text x="20" y="32" text-anchor="middle" font-size="3.5" fill="#D4AF37" font-family="Arial">ROYALS</text>

let db=null, liveState=null;

function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

// ══════════════════════════════════════════════
// FIREBASE CONFIG — load from localStorage or prompt
// ══════════════════════════════════════════════
function getConfig(){
  try{const s=localStorage.getItem('ipl_fbcfg');return s?JSON.parse(s):null;}catch{return null;}
}

function boot(){
  const cfg=getConfig();
  if(!cfg||!cfg.apiKey||!cfg.databaseURL){renderConfigScreen();return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    db=firebase.database();
    renderShell(null);
    db.ref('iplbets').on('value',snap=>{
      liveState=snap.val();
      setOnline(true);
      if(!liveState||!liveState.players){
        if(myIdx===-1)openSetupModal();
        else renderShell(null);
      } else {
        renderShell(liveState);
      }
    },()=>setOnline(false));
  }catch(e){renderConfigScreen('Firebase error: '+e.message);}
}

function setOnline(v){const d=document.getElementById('sd');if(d)d.className='sync-dot'+(v?' online':'');}

function saveConfig(){
  let raw=document.getElementById('fb-cfg').value.trim();
  try{
    // handle JS object syntax (unquoted keys, trailing commas)
    raw=raw.replace(/^[^{]*/,'').replace(/[^}]*$/,'');
    raw=raw.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/'/g,'"').replace(/,\s*([}\]])/g,'$1');
    const cfg=JSON.parse(raw);
    if(!cfg.apiKey)throw new Error('Missing apiKey');
    if(!cfg.databaseURL)throw new Error('Missing databaseURL — make sure you created a Realtime Database');
    localStorage.setItem('ipl_fbcfg',JSON.stringify(cfg));
    showToast('Config saved! Connecting…');
    setTimeout(()=>location.reload(),800);
  }catch(e){showToast('Parse error: '+e.message);}
}

function initGame(){
  const ns=[
    document.getElementById('pn0').value.trim()||'Player 1',
    document.getElementById('pn1').value.trim()||'Player 2',
    document.getElementById('pn2').value.trim()||'Player 3'
  ];
  const bal=parseInt(document.getElementById('sb').value)||5000;
  const players=ns.map(n=>({name:n,initials:ini(n),balance:bal,startBal:bal}));
  const matches={};
  MATCHES_TEMPLATE.forEach(m=>{matches[m.id]={...m,odds:m.odds,status:'upcoming',bets:{},winner:null};});
  const btn=document.querySelector('#setup-ov .place-btn');
  if(btn){btn.disabled=true;btn.textContent='Setting up…';}
  db.ref('iplbets').set({players,matches,history:{}})
    .then(()=>{document.getElementById('setup-ov')?.remove();showToast('Game created! Share the app URL with your brothers.');})
    .catch(e=>showToast('Error: '+e.message));
}

  const p=document.getElementById('panel');if(!p)return;
  if(currentTab==='matches')p.innerHTML=buildMatches();
  else if(currentTab==='history')p.innerHTML=buildHistory();
  else p.innerHTML=buildLeaderboard();
}

// ══════════════════════════════════════════════
// MATCHES
// ══════════════════════════════════════════════
function buildMatches(){
  if(!liveState?.matches)return'<div class="empty-state">Waiting for game data…</div>';
  return Object.values(liveState.matches).map(m=>{
    const t1=TEAMS[m.t1],t2=TEAMS[m.t2];
    const bets=m.bets?Object.values(m.bets):[];
    const bChips=bets.length?`<div class="bets-on-match">${bets.map(b=>{
      const p=liveState.players[b.player];
      return`<span class="bet-chip bc${b.player}">${p?.initials||'?'} → ${b.pick} ₹${b.amount}</span>`;
    }).join('')}</div>`:'';
    const canSettle=bets.length>0&&m.status!=='done';
    return`<div class="match-card">
      <div class="match-header">
        <span class="match-no">Match #${m.id.replace('m','')}</span>
        <span class="match-date">${m.date} · ${m.venue}</span>
        <span class="ms ms-${m.status}">${m.status}</span>
      </div>
      <div class="teams-row">
        <div class="team"><div class="team-logo" style="background:${t1.bg};padding:0;overflow:hidden">${t1.svg}</div><div class="team-abbr">${m.t1}</div><div class="team-name">${t1.name}</div></div>
        <div class="vs">VS</div>
        <div class="team"><div class="team-logo" style="background:${t2.bg};padding:0;overflow:hidden">${t2.svg}</div><div class="team-abbr">${m.t2}</div><div class="team-name">${t2.name}</div></div>
      </div>
      ${m.status!=='done'?`<div class="pick-row">
        <button class="pick-btn pick-t1" onclick="openBet('${m.id}','${m.t1}')">
          <span class="pick-flag">Bet on</span><span class="pick-team">${m.t1}</span>
        </button>
        <button class="pick-btn pick-draw" onclick="openBet('${m.id}','DRAW')">
          <span class="pick-flag">Bet on</span><span class="pick-team">Tie</span>
        </button>
        <button class="pick-btn pick-t2" onclick="openBet('${m.id}','${m.t2}')">
          <span class="pick-flag">Bet on</span><span class="pick-team">${m.t2}</span>
        </button>
      </div>`:`<div class="winner-label">Winner: <strong>${m.winner}</strong></div>`}
      ${bChips}
      ${canSettle?`<div class="declare-row"><button class="declare-btn" onclick="openResult('${m.id}')">Declare Winner →</button></div>`:''}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════
function buildHistory(){
  const h=liveState?.history?Object.values(liveState.history):[];
  const players=liveState?.players||[];
  if(!h.length)return'<div class="empty-state">No settled matches yet.<br>Place bets and declare results!</div>';
  return[...h].reverse().map(e=>`
    <div class="hist-item">
      <div class="hist-match">${e.t1} vs ${e.t2} · <strong>${e.winner} Won</strong></div>
      ${(e.payouts||[]).map(pp=>{
        const p=players[pp.player];
        return`<div class="hist-result ${pp.net>0?'hist-win':'hist-lose'}">${p?.name||'?'} (${pp.pick}): ${pp.net>0?'+₹'+pp.net+' profit':'-₹'+pp.bet}</div>`;
      }).join('')}
    </div>`).join('');
}

// ══════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════
function buildLeaderboard(){
  const players=liveState?.players||[];
  if(!players.length)return'<div class="empty-state">No players yet.</div>';
  const medals=['🥇','🥈','🥉'];
  const colors=[['#fdf0d9','#7a4800'],['#d4f5e8','#065038'],['#dceeff','#003a80']];
  const amtColors=['#BA7517','#3B6D11','#185FA5'];
  return players.map((p,i)=>({...p,i})).sort((a,b)=>b.balance-a.balance).map((p,rank)=>{
    const profit=p.balance-p.startBal;
    const[bg,fg]=colors[rank]||['var(--bg2)','var(--text2)'];
    return`<div class="lb-row">
      <div class="lb-rank${rank===0?' gold':''}">${medals[rank]||rank+1}</div>
      <div class="lb-avatar" style="background:${bg};color:${fg}">${p.initials||ini(p.name)}</div>
      <div class="lb-name">${p.name}</div>
      <div>
        <div class="lb-amount" style="color:${amtColors[rank]||'var(--text)'}">₹${Math.round(p.balance).toLocaleString()}</div>
        <div class="lb-profit ${profit>=0?'profit-pos':'profit-neg'}">${profit>=0?'+':''}₹${Math.round(profit)}</div>
      </div>
    </div>`;
  }).join('');
}

// BET MODAL
// ══════════════════════════════════════════════
function openBet(mid,pick){
  if(myIdx===-1)return showToast('Tap "I am:" above to select your name!');
  const m=liveState.matches[mid];
  const bets=m.bets?Object.values(m.bets):[];
  if(bets.find(b=>b.player===myIdx))return showToast('You already bet on this match!');
  betData={mid,pick};
  const player=liveState.players[myIdx];
  rmModal('bet-ov');
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='bet-ov';
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <h3>Bet on ${pick==='DRAW'?'Tie/No Result':pick}</h3>
    <div class="modal-sub">${m.t1} vs ${m.t2}</div>
    <div style="background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:18px;font-size:13px;color:var(--text);">
      Betting as <strong>${player.name}</strong> · Balance: <strong>₹${Math.round(player.balance).toLocaleString()}</strong>
    </div>
    <label class="modal-label">How much? (₹)</label>
    <div class="quick-amounts">
      <button class="qa-btn" onclick="setA(100)">₹100</button>
      <button class="qa-btn" onclick="setA(250)">₹250</button>
      <button class="qa-btn" onclick="setA(500)">₹500</button>
      <button class="qa-btn" onclick="setA(1000)">₹1000</button>
    </div>
    <input class="finput" type="number" id="ba" inputmode="numeric" min="10" max="1000" placeholder="Enter amount (max ₹1,000)…"/>
    <div style="background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.6;">
      If <strong>${pick==='DRAW'?'Tie':pick}</strong> wins → you get your ₹ back + an equal share of the losers' pot 🏆<br>
      If they lose → your stake goes into the winners' pot
    </div>
    <button class="place-btn" id="pbtn" onclick="confirmBet()">Place Bet 🏏</button>
    <button class="cancel-btn" onclick="rmModal('bet-ov')">Cancel</button>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
}
function setA(v){const e=document.getElementById('ba');if(e)e.value=v;}
function confirmBet(){
  const amt=parseFloat(document.getElementById('ba').value);
  const pl=liveState.players[myIdx];
  if(!amt||amt<10)return showToast('Min bet ₹10');
  if(amt>1000)return showToast('Max bet is ₹1,000!');
  if(amt>pl.balance)return showToast('Not enough balance!');
  const btn=document.getElementById('pbtn');
  if(btn){btn.disabled=true;btn.textContent='Placing…';}
  db.ref('iplbets/players/'+myIdx).transaction(p=>{
    if(!p)return p;
    if(p.balance<amt)return;
    p.balance=Math.round((p.balance-amt)*100)/100;
    return p;
  }).then(r=>{
    if(!r.committed)return showToast('Balance update failed');
    return db.ref('iplbets/matches/'+betData.mid+'/bets').push({player:myIdx,pick:betData.pick,amount:amt,ts:Date.now()});
  }).then(()=>db.ref('iplbets/matches/'+betData.mid+'/status').set('live'))
  .then(()=>{rmModal('bet-ov');showToast('Bet placed! ₹'+amt+' on '+betData.pick+' 🏏');})
  .catch(e=>{showToast('Error: '+e.message);if(btn){btn.disabled=false;btn.textContent='Place Bet 🏏';}});
}

// ══════════════════════════════════════════════
// RESULT MODAL
// ══════════════════════════════════════════════
function openResult(mid){
  const m=liveState.matches[mid];
  resultData={mid,winner:null,payouts:null};
  rmModal('res-ov');
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='res-ov';
  const opts=[m.t1,m.t2,'DRAW'];
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <h3>Declare Result</h3>
    <div class="modal-sub">${m.t1} vs ${m.t2}</div>
    <label class="modal-label">Who Won?</label>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      ${opts.map(o=>`<button class="wopt-btn" id="wb-${o}" onclick="selW('${mid}','${o}')">${o==='DRAW'?'Tie/NR':o}</button>`).join('')}
    </div>
    <div id="pal"></div>
    <button class="place-btn" style="margin-top:14px;" id="rbtn" onclick="confirmResult()">Confirm & Settle ✓</button>
    <button class="cancel-btn" onclick="rmModal('res-ov')">Cancel</button>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
}
function selW(mid,w){
  resultData.winner=w;
  document.querySelectorAll('.wopt-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('wb-'+w)?.classList.add('selected');
  const m=liveState.matches[mid];
  const bets=m.bets?Object.values(m.bets):[];
  const players=liveState.players;
  // split losers' pot equally among winners
  const winBets=bets.filter(b=>b.pick===w);
  const loseBets=bets.filter(b=>b.pick!==w);
  const losersPot=loseBets.reduce((s,b)=>s+b.amount,0);
  const winnersStake=winBets.reduce((s,b)=>s+b.amount,0);
  const payouts=bets.map(b=>{
    const won=b.pick===w;
    let net;
    if(won){
      // get stake back + proportional share of losers' pot
      const share=winnersStake>0?Math.round((b.amount/winnersStake)*losersPot):0;
      net=share; // net gain (stake already deducted, will be returned in confirmResult)
    } else {
      net=-b.amount;
    }
    return{player:b.player,pick:b.pick,bet:b.amount,net,won};
  });
  resultData.payouts=payouts;
  document.getElementById('pal').innerHTML=payouts.map(pp=>{
    const p=players[pp.player];
    const display=pp.won?`+₹${pp.net} profit (stake returned)`:`-₹${pp.bet}`;
    return`<div class="payout-row"><span>${p?.name||'?'} → ${pp.pick}</span><span class="${pp.won?'payout-win':'payout-lose'}">${display}</span></div>`;
  }).join('');
}
function confirmResult(){
  if(!resultData.winner)return showToast('Please select the winner!');
  const btn=document.getElementById('rbtn');
  if(btn){btn.disabled=true;btn.textContent='Settling…';}
  const m=liveState.matches[resultData.mid];
  const updates={};
  updates['iplbets/matches/'+resultData.mid+'/status']='done';
  updates['iplbets/matches/'+resultData.mid+'/winner']=resultData.winner;
  const hk=db.ref('iplbets/history').push().key;
  updates['iplbets/history/'+hk]={matchId:resultData.mid,t1:m.t1,t2:m.t2,winner:resultData.winner,payouts:resultData.payouts,ts:Date.now()};
  resultData.payouts.forEach(pp=>{
    const cur=liveState.players[pp.player].balance;
    // winners: get their stake back + net profit. losers: nothing (already deducted)
    const returned=pp.won ? pp.bet+pp.net : 0;
    updates['iplbets/players/'+pp.player+'/balance']=Math.round((cur+returned)*100)/100;
  });
  db.ref().update(updates)
    .then(()=>{rmModal('res-ov');showToast('Match settled! Balances updated ✓');})
    .catch(e=>{showToast('Error: '+e.message);if(btn){btn.disabled=false;btn.textContent='Confirm & Settle ✓';}});
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function rmModal(id){const e=document.getElementById(id);if(e)e.remove();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// Boot
boot();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
